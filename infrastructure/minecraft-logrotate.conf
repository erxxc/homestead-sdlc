/var/log/minecraft-audit.json {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 644 minecraft minecraft
    postrotate
        systemctl restart minecraft-audit
    endscript
}

/var/log/nginx/access.log
/var/log/nginx/error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    sharedscripts
    postrotate
        nginx -s reopen
    endscript
}

/var/log/minecraft-integrity.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 644 minecraft minecraft
}
