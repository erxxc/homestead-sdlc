name: ZAP DAST Scan
on:
  push:
    branches: [main]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://${{ secrets.VPS_HOST }}:8100'
          fail_action: false
          artifact_name: zap-report
