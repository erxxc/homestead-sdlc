<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homestead SMP</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon.ico">

  <!-- Apple touch icon (iOS home screen) -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- Web app manifest -->
  <link rel="manifest" href="/site.webmanifest">

  <!-- Theme color (browser chrome on mobile) -->
  <meta name="theme-color" content="#166534">

  <!-- Open Graph — shows sprout image when link shared on Discord/social -->
  <meta property="og:title" content="Homestead SMP">
  <meta property="og:description" content="Fabric 1.20.1 · Homestead 1.3.1 · mc.geigercapital.us">
  <meta property="og:image" content="https://play.geigercapital.us/apple-touch-icon.png">
  <meta property="og:url" content="https://play.geigercapital.us">
  <meta name="twitter:card" content="summary">
</head>
<body>
  <div class="container">
    <h1>🌿 Homestead SMP</h1>
    <p class="subtitle">Fabric 1.20.1 · Homestead 1.3.1</p>
    <div class="status">
      <div id="status-indicator">
        <span class="status-dot" id="dot"></span>
        <span id="status-text">Checking...</span>
      </div>
      <div class="address">mc.geigercapital.us</div>
      <div class="players" id="players"></div>
      <div class="version" id="version"></div>
    </div>
    <div class="links">
      <a href="https://map.geigercapital.us" class="link link-primary">Live Map</a>
      <a href="https://www.curseforge.com/minecraft/modpacks/homestead-cozy" class="link link-secondary">Modpack</a>
    </div>
    <div class="updated" id="updated"></div>
  </div>
  <script>
    async function fetchStatus() {
      try {
        const res = await fetch('https://api.geigercapital.us/status');
        const data = await res.json();
        const dot = document.getElementById('dot');
        const statusText = document.getElementById('status-text');
        const players = document.getElementById('players');
        const version = document.getElementById('version');
        const updated = document.getElementById('updated');
        if (data.online) {
          dot.classList.remove('offline');
          statusText.textContent = 'Server Online';
          players.textContent = `${data.players.current} / ${data.players.max} players online`;
          version.textContent = `${data.server.version} · Minecraft ${data.server.minecraft}`;
        } else {
          dot.classList.add('offline');
          statusText.textContent = 'Server Offline';
          players.textContent = '';
          version.textContent = '';
        }
        const ts = new Date(data.timestamp);
        updated.textContent = `Last updated: ${ts.toUTCString()}`;
      } catch (e) {
        document.getElementById('status-text').textContent = 'Status unavailable';
        document.getElementById('dot').classList.add('offline');
      }
    }
    fetchStatus();
    setInterval(fetchStatus, 60000);
  </script>
</body>
</html>
