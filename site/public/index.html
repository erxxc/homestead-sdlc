<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homestead SMP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 600px; padding: 48px 24px; text-align: center; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 48px; }
    .status { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #22c55e; margin-right: 8px; animation: pulse 2s infinite; }
    .status-dot.offline { background: #ef4444; animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .address { font-family: monospace; font-size: 1.1rem; color: #60a5fa; margin: 16px 0; }
    .players { font-size: 0.9rem; color: #888; margin-top: 8px; }
    .version { font-size: 0.8rem; color: #555; margin-top: 4px; }
    .links { display: flex; gap: 12px; justify-content: center; margin-top: 32px; flex-wrap: wrap; }
    .link { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; transition: opacity 0.2s; }
    .link:hover { opacity: 0.8; }
    .link-primary { background: #1a56db; color: white; }
    .link-secondary { border: 1px solid #2a2a2a; color: #888; }
    .updated { font-size: 0.75rem; color: #444; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌿 Homestead SMP</h1>
    <p class="subtitle">Fabric 1.20.1 · Homestead 1.3.1</p>
    <div class="status">
      <div id="status-indicator">
        <span class="status-dot" id="dot"></span>
        <span id="status-text">Checking...</span>
      </div>
      <div class="address">mc.geigercapital.us</div>
      <div class="players" id="players"></div>
      <div class="version" id="version"></div>
    </div>
    <div class="links">
      <a href="https://map.geigercapital.us" class="link link-primary">Live Map</a>
      <a href="https://www.curseforge.com/minecraft/modpacks/homestead-cozy" class="link link-secondary">Modpack</a>
    </div>
    <div class="updated" id="updated"></div>
  </div>
  <script>
    async function fetchStatus() {
      try {
        const res = await fetch('https://api.geigercapital.us/status');
        const data = await res.json();
        const dot = document.getElementById('dot');
        const statusText = document.getElementById('status-text');
        const players = document.getElementById('players');
        const version = document.getElementById('version');
        const updated = document.getElementById('updated');
        if (data.online) {
          dot.classList.remove('offline');
          statusText.textContent = 'Server Online';
          players.textContent = `${data.players.current} / ${data.players.max} players online`;
          version.textContent = `${data.server.version} · Minecraft ${data.server.minecraft}`;
        } else {
          dot.classList.add('offline');
          statusText.textContent = 'Server Offline';
          players.textContent = '';
          version.textContent = '';
        }
        const ts = new Date(data.timestamp);
        updated.textContent = `Last updated: ${ts.toUTCString()}`;
      } catch (e) {
        document.getElementById('status-text').textContent = 'Status unavailable';
        document.getElementById('dot').classList.add('offline');
      }
    }
    fetchStatus();
    setInterval(fetchStatus, 60000);
  </script>
</body>
</html>
